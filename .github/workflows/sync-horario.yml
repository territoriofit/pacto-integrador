# Sync horario Pacto -> CRM Territorio Fit (nuvem — nao depende de PC ligado)
#
# Roda a cada hora no minuto :07 (fora de :00/:30, horarios congestionados do
# scheduler do Actions). Job leve (~1-2 min): visitantes 24h do kanban +
# relatorio BV (novos visitantes + conversoes) + Meta Lead Ads.
#
# O agendador local do PC (CRM_TeritorioFit_Scheduler) foi DESATIVADO em
# 2026-07-05 — este workflow e a unica fonte do job horario.
#
# Repo publico desde 2026-07-05: minutos de Actions ilimitados/gratis.
# Secrets necessarios: os mesmos do sync-diario.yml.

name: Sync horario Pacto -> CRM

on:
  schedule:
    - cron: "7 * * * *"
  workflow_dispatch: {}

concurrency:
  group: sync-horario
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: .github/workflows/sync-horario.yml

      - name: Instalar dependencias
        run: pip install requests python-dotenv supabase

      - name: Sync horario (visitantes 24h + BV + Meta Lead Ads)
        env:
          PACTO_TOKEN: ${{ secrets.PACTO_TOKEN }}
          PACTO_CHAVE: ${{ secrets.PACTO_CHAVE }}
          PACTO_EMPRESA_ID: ${{ secrets.PACTO_EMPRESA_ID }}
          PACTO_CTX: ${{ secrets.PACTO_CTX }}
          PACTO_USER: ${{ secrets.PACTO_USER }}
          PACTO_PWD: ${{ secrets.PACTO_PWD }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          CRM_TENANT_ID: ${{ secrets.CRM_TENANT_ID }}
        run: python agente_integrador_pacto.py --sync-horario
