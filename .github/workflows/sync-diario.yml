# Sync diário Pacto → CRM Território Fit
#
# Roda às 04:12 UTC (01:12 BRT). Minuto/hora fora de pico de propósito:
# em 2026-07-03 o cron "30 5" só disparou às 12:29 UTC (~7h de atraso do
# scheduler do Actions — :00/:30 são os horários mais congestionados).
# Com ~50 min de scan + folga pra atraso, termina antes das 05:00 BRT,
# quando a academia abre.
#
# Consumo: ~45-55 min/dia ≈ 1.400-1.700 min/mês (cota Free: 2.000 min/mês
# em repo privado — acompanhar em Settings > Billing).
#
# Secrets necessários (Settings > Secrets and variables > Actions):
#   PACTO_TOKEN, PACTO_CHAVE, PACTO_EMPRESA_ID, PACTO_CTX,
#   PACTO_USER, PACTO_PWD, SUPABASE_KEY, CRM_TENANT_ID

name: Sync diário Pacto → CRM

on:
  schedule:
    - cron: "12 4 * * *"
  workflow_dispatch: {}

concurrency:
  group: sync-diario
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    # 2026-07-06: run estourou os 100 min (1h19 até chegar no ultimo_acesso,
    # que precisa de ~25 min pra base de ~2000) e foi cancelado no meio.
    # 2026-07-08: estourou os 150 min (vendas_avulsas sozinho leva ~75 min;
    # cancelado em 800/1987 do scan de parcelas — consultora_vinculo,
    # recorrentes e ultimo_acesso ficaram sem rodar e o metadata dos leads
    # ficou pelado). Diário completo hoje ≈ 4h; repo é público (minutos
    # ilimitados) e o limite de job do GitHub é 6h.
    timeout-minutes: 330
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Instalar dependências
        run: pip install requests python-dotenv supabase

      - name: Sync completo (alunos, risco, fases, deals, parcelas atrasadas)
        env:
          PACTO_TOKEN: ${{ secrets.PACTO_TOKEN }}
          PACTO_CHAVE: ${{ secrets.PACTO_CHAVE }}
          PACTO_EMPRESA_ID: ${{ secrets.PACTO_EMPRESA_ID }}
          PACTO_CTX: ${{ secrets.PACTO_CTX }}
          PACTO_USER: ${{ secrets.PACTO_USER }}
          PACTO_PWD: ${{ secrets.PACTO_PWD }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          CRM_TENANT_ID: ${{ secrets.CRM_TENANT_ID }}
        run: python agente_integrador_pacto.py --sync-diario
